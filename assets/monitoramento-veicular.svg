<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Monitoramento Veicular</title>
  <desc id="desc">Ilustração de um veículo sendo monitorado por GPS com mapa, rota e painel de controle.</desc>

  <defs>
    <linearGradient id="bgVehicle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accentVehicle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="800" height="500" rx="36" fill="url(#bgVehicle)"/>

  <circle cx="110" cy="95" r="65" fill="#38bdf8" opacity="0.12"/>
  <circle cx="720" cy="420" r="90" fill="#22c55e" opacity="0.10"/>

  <rect x="70" y="70" width="660" height="360" rx="28" fill="#020617" opacity="0.78" filter="url(#shadow)"/>
  <rect x="95" y="95" width="420" height="310" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2"/>

  <!-- map grid -->
  <path d="M120 160 C210 115, 300 210, 390 170 C445 145, 475 165, 495 185" fill="none" stroke="#334155" stroke-width="3"/>
  <path d="M120 300 C195 250, 260 345, 340 300 C410 260, 455 300, 495 260" fill="none" stroke="#334155" stroke-width="3"/>
  <path d="M180 115 L180 385" stroke="#1e293b" stroke-width="2"/>
  <path d="M275 115 L275 385" stroke="#1e293b" stroke-width="2"/>
  <path d="M370 115 L370 385" stroke="#1e293b" stroke-width="2"/>
  <path d="M465 115 L465 385" stroke="#1e293b" stroke-width="2"/>
  <path d="M110 180 L500 180" stroke="#1e293b" stroke-width="2"/>
  <path d="M110 260 L500 260" stroke="#1e293b" stroke-width="2"/>
  <path d="M110 340 L500 340" stroke="#1e293b" stroke-width="2"/>

  <!-- route -->
  <path d="M150 335 C210 280, 260 290, 315 235 C365 185, 425 185, 470 145" fill="none" stroke="url(#accentVehicle)" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 18"/>

  <!-- markers -->
  <circle cx="150" cy="335" r="12" fill="#22c55e"/>
  <circle cx="470" cy="145" r="12" fill="#38bdf8"/>
  <path d="M470 118 C448 118, 432 135, 432 156 C432 186, 470 222, 470 222 C470 222, 508 186, 508 156 C508 135, 492 118, 470 118Z" fill="#38bdf8"/>
  <circle cx="470" cy="156" r="14" fill="#0f172a"/>

  <!-- car -->
  <g transform="translate(255 220)">
    <rect x="0" y="35" width="135" height="50" rx="14" fill="#e2e8f0"/>
    <path d="M28 35 L48 5 H92 L115 35 Z" fill="#cbd5e1"/>
    <rect x="52" y="13" width="32" height="20" rx="4" fill="#0f172a" opacity="0.8"/>
    <rect x="88" y="13" width="18" height="20" rx="4" fill="#0f172a" opacity="0.8"/>
    <circle cx="34" cy="88" r="16" fill="#020617"/>
    <circle cx="101" cy="88" r="16" fill="#020617"/>
    <circle cx="34" cy="88" r="7" fill="#64748b"/>
    <circle cx="101" cy="88" r="7" fill="#64748b"/>
    <rect x="8" y="52" width="18" height="8" rx="4" fill="#38bdf8"/>
    <rect x="109" y="52" width="18" height="8" rx="4" fill="#22c55e"/>
  </g>

  <!-- side panel -->
  <rect x="540" y="95" width="165" height="310" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="565" y="135" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="20" font-weight="700">Painel</text>

  <g font-family="Arial, sans-serif">
    <text x="565" y="180" fill="#94a3b8" font-size="13">Velocidade</text>
    <text x="565" y="207" fill="#38bdf8" font-size="28" font-weight="700">72 km/h</text>

    <text x="565" y="255" fill="#94a3b8" font-size="13">Status</text>
    <rect x="565" y="268" width="105" height="30" rx="15" fill="#14532d"/>
    <circle cx="582" cy="283" r="6" fill="#22c55e"/>
    <text x="596" y="289" fill="#dcfce7" font-size="13" font-weight="700">Ativo</text>

    <text x="565" y="335" fill="#94a3b8" font-size="13">Sinal GPS</text>
    <rect x="565" y="350" width="118" height="10" rx="5" fill="#1e293b"/>
    <rect x="565" y="350" width="92" height="10" rx="5" fill="url(#accentVehicle)"/>
  </g>

  <text x="70" y="462" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="28" font-weight="800">Monitoramento Veicular</text>
  <text x="70" y="486" fill="#94a3b8" font-family="Arial, sans-serif" font-size="15">Sistema básico em Python para simulação e acompanhamento de veículos</text>
</svg>
