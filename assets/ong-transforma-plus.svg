<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Site Institucional ONG Transforma+</title>
  <desc id="desc">Ilustração para site institucional da ONG Transforma+, com pessoas, coração e elementos de impacto social.</desc>

  <defs>
    <linearGradient id="bgOng" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="accentOng" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="800" height="500" rx="36" fill="url(#bgOng)"/>
  <circle cx="110" cy="110" r="70" fill="#f97316" opacity="0.13"/>
  <circle cx="700" cy="395" r="95" fill="#06b6d4" opacity="0.13"/>

  <!-- website card -->
  <rect x="85" y="75" width="630" height="350" rx="30" fill="#ffffff" filter="url(#softShadow)"/>
  <rect x="85" y="75" width="630" height="72" rx="30" fill="#0f172a"/>
  <circle cx="125" cy="111" r="8" fill="#fb7185"/>
  <circle cx="153" cy="111" r="8" fill="#facc15"/>
  <circle cx="181" cy="111" r="8" fill="#4ade80"/>

  <text x="225" y="120" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="800">Transforma+</text>
  <text x="500" y="116" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="13">Início</text>
  <text x="560" y="116" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="13">Projetos</text>
  <text x="635" y="116" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="13">Contato</text>

  <!-- hero text -->
  <text x="125" y="205" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="800">Transformando vidas</text>
  <text x="125" y="243" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="800">com pequenas ações</text>

  <text x="125" y="282" fill="#475569" font-family="Arial, sans-serif" font-size="16">Site institucional para apresentar projetos,</text>
  <text x="125" y="305" fill="#475569" font-family="Arial, sans-serif" font-size="16">história, voluntariado e formas de doação.</text>

  <rect x="125" y="337" width="150" height="44" rx="22" fill="url(#accentOng)"/>
  <text x="159" y="365" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" font-weight="700">Saiba mais</text>

  <!-- people and heart illustration -->
  <g transform="translate(470 185)">
    <circle cx="45" cy="45" r="32" fill="#fb923c"/>
    <circle cx="125" cy="45" r="32" fill="#22d3ee"/>
    <circle cx="85" cy="120" r="36" fill="#a78bfa"/>

    <path d="M85 84 C68 62, 35 68, 35 98 C35 132, 85 157, 85 157 C85 157, 135 132, 135 98 C135 68, 102 62, 85 84Z" fill="#ef4444"/>

    <path d="M15 220 C20 150, 72 150, 85 185 C98 150, 150 150, 155 220Z" fill="#0f172a" opacity="0.9"/>
    <circle cx="85" cy="110" r="23" fill="#fef3c7"/>

    <path d="M45 85 C20 100, 8 135, 12 175" stroke="#fb923c" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M125 85 C150 100, 162 135, 158 175" stroke="#22d3ee" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>

  <!-- stats blocks -->
  <rect x="355" y="337" width="95" height="55" rx="14" fill="#f8fafc"/>
  <text x="380" y="360" fill="#f97316" font-family="Arial, sans-serif" font-size="18" font-weight="800">+50</text>
  <text x="373" y="381" fill="#64748b" font-family="Arial, sans-serif" font-size="12">ações</text>

  <rect x="465" y="337" width="95" height="55" rx="14" fill="#f8fafc"/>
  <text x="490" y="360" fill="#06b6d4" font-family="Arial, sans-serif" font-size="18" font-weight="800">+300</text>
  <text x="485" y="381" fill="#64748b" font-family="Arial, sans-serif" font-size="12">pessoas</text>

  <rect x="575" y="337" width="95" height="55" rx="14" fill="#f8fafc"/>
  <text x="604" y="360" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="18" font-weight="800">+20</text>
  <text x="598" y="381" fill="#64748b" font-family="Arial, sans-serif" font-size="12">projetos</text>

  <text x="85" y="465" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="800">ONG Transforma+</text>
  <text x="85" y="488" fill="#64748b" font-family="Arial, sans-serif" font-size="15">Imagem para projeto de site institucional no portfólio</text>
</svg>
